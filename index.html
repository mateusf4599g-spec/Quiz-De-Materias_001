function criarMenu(){

let menu=document.getElementById("menu")

let temas=[...new Set(banco.map(p=>p.tema))]

menu.innerHTML="<h2 style='font-size:32px'>Escolha o tema</h2>"

temas.forEach(function(t){

let botao=document.createElement("div")
botao.className="temaBtn"
botao.innerText=t

botao.onclick=function(){

temaSelecionado=t

document.querySelectorAll(".temaBtn").forEach(b=>{
b.classList.remove("selecionada")
})

botao.classList.add("selecionada")

}

menu.appendChild(botao)

})

let confirmar=document.createElement("button")
confirmar.innerText="Confirmar tema"

confirmar.onclick=function(){

if(temaSelecionado){
iniciarQuiz(temaSelecionado)
}

}

menu.appendChild(confirmar)

}

function iniciarQuiz(tema){

perguntas=banco.filter(p=>p.tema===tema)

embaralhar(perguntas)

document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"

atual=0
pontos=0

carregar()

}

function carregar(){

let p=perguntas[atual]

document.getElementById("tema").innerText="Tema: "+p.tema
document.getElementById("pergunta").innerText=p.pergunta

for(let i=0;i<4;i++){

let op=document.getElementById("op"+i)

op.innerText=p.opcoes[i]
op.className="opcao"

op.onclick=function(){

opcaoSelecionada=i

document.querySelectorAll(".opcao").forEach(o=>{
o.classList.remove("selecionada")
})

op.classList.add("selecionada")

}

}

document.getElementById("placar").innerText=
"Pergunta "+(atual+1)+" de "+perguntas.length+" | Pontos: "+pontos

document.getElementById("progresso").style.width=
((atual/perguntas.length)*100)+"%"

document.getElementById("explicacao").innerText=""

respondido=false

document.getElementById("btnProxima").style.display="none"
document.getElementById("btnConfirmar").style.display="block"

}

function confirmarResposta(){

if(opcaoSelecionada===null) return

responder(opcaoSelecionada)

opcaoSelecionada=null

document.getElementById("btnProxima").style.display="block"
document.getElementById("btnConfirmar").style.display="none"

}

function responder(i){

if(respondido) return

respondido=true

let correta=perguntas[atual].correta

if(i===correta){

document.getElementById("op"+i).classList.add("correta")
pontos++

}else{

document.getElementById("op"+i).classList.add("errada")
document.getElementById("op"+correta).classList.add("correta")

}

document.getElementById("explicacao").innerText=
"Explicação: "+perguntas[atual].explicacao

}

function proxima(){

atual++

if(atual>=perguntas.length){

alert("Fim do quiz! Pontos: "+pontos+" de "+perguntas.length)

location.reload()

return

}

carregar()

}

function embaralhar(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

}

// BOTÃO VOLTAR AO MENU

function voltarMenu(){

document.getElementById("quiz").style.display="none"
document.getElementById("menu").style.display="block"

atual=0
pontos=0
respondido=false
opcaoSelecionada=null
temaSelecionado=null

document.getElementById("menu").innerHTML=""

criarMenu()

}

criarMenu()

</script>
