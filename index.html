<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Engenharia Florestal</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:15px;
-webkit-tap-highlight-color: transparent;
}

.container{
background:#1e293b;
padding:25px;
border-radius:12px;
width:95%;
max-width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.temaBtn{
background:#111827;
padding:16px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
text-align:center;
font-size:30px;
border:3px solid #1f2937;
color:white;
user-select:none;
touch-action: manipulation;
transition:0.2s;
}

.temaBtn:active{
background:#1f2937;
}

.selecionadaMenu{
background:#1d4ed8 !important;
border:3px solid #60a5fa !important;
color:white;
}

.pergunta{
font-size:32px;
margin-bottom:20px;
line-height:1.4;
}

.opcao{
background:#111827;
padding:16px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
font-size:24px;
border:3px solid #1f2937;
color:white;
user-select:none;
touch-action: manipulation;
}

.selecionada{
background:#1d4ed8 !important;
border:3px solid #60a5fa !important;
}

.correta{
background:#16a34a !important;
border:3px solid #4ade80;
}

.errada{
background:#dc2626 !important;
border:3px solid #f87171;
}

#explicacao{
margin-top:15px;
background:#111827;
padding:15px;
border-radius:8px;
font-size:18px;
}

#placar{
font-size:22px;
margin-bottom:10px;
}

#tema{
font-size:18px;
margin-bottom:10px;
}

button{
margin-top:15px;
padding:16px;
width:100%;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
font-size:24px;
}

#barra{
height:12px;
background:#1f2937;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

#progresso{
height:12px;
background:#3b82f6;
width:0%;
transition:0.4s;
}

.barra-pesquisa{
display:flex;
gap:5px;
margin-bottom:20px;
}

.barra-pesquisa input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
font-size:18px;
}

.barra-pesquisa button{
padding:10px 15px;
border-radius:6px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body>

<div class="container" id="inicio">

<h1 style="text-align:center; font-size:34px;">
🌳 Quiz de Engenharia Florestal
</h1>

<p style="text-align:center; font-size:12px; margin-top:10px; opacity:0.7;">
feito por Matheus
</p>

<p style="font-size:20px; text-align:center;">
Sistema de perguntas e respostas para estudar matérias da Engenharia Florestal.
</p>

<button onclick="comecarQuiz()">Começar</button>

</div>

<div class="container" id="menu" style="display:none"></div>

<div class="container" id="quiz" style="display:none">

<div id="barra">
<div id="progresso"></div>
</div>

<div id="placar"></div>
<div id="tema"></div>

<div class="pergunta" id="pergunta"></div>

<div class="opcao" id="op0"></div>
<div class="opcao" id="op1"></div>
<div class="opcao" id="op2"></div>
<div class="opcao" id="op3"></div>

<div id="explicacao"></div>

<button id="btnConfirmar" onclick="confirmarResposta()">Confirmar resposta</button>
<button id="btnProxima" onclick="proxima()" style="display:none">Próxima pergunta</button>
<button onclick="voltarMenu()">Voltar ao menu</button>

</div>

<script>

let materiaSelecionada=null
let assuntoSelecionado=null
let opcaoSelecionada=null

let banco=[

{materia:"Introdução à Engenharia Florestal", assunto:"O que é Engenharia Florestal", pergunta:"A Engenharia Florestal pode ser definida como a área que:", opcoes:["Estuda apenas a produção de madeira para indústrias","Planeja, maneja e conserva recursos florestais de forma sustentável","Trabalha exclusivamente com agricultura de grãos","Atua somente na preservação sem uso econômico"], correta:1, explicacao:"A Engenharia Florestal envolve planejamento, manejo e conservação sustentável."},

{materia:"Mecânica dos Fluidos", assunto:"Introdução à Mecânica dos Fluidos", pergunta:"Um fluido pode ser definido corretamente como:", opcoes:["Material que mantém forma fixa","Substância que se deforma continuamente sob força tangencial","Corpo rígido","Material apenas sólido"], correta:1, explicacao:"Fluido se deforma continuamente sob força tangencial."}

]

let perguntas=[]
let atual=0
let pontos=0
let respondido=false

function comecarQuiz(){
document.getElementById("inicio").style.display="none"
document.getElementById("menu").style.display="block"
criarMenuMaterias()
}



function criarMenuMaterias(){

let menu=document.getElementById("menu")

menu.innerHTML="<h2>Escolha a matéria</h2>"

let materias=[...new Set(banco.map(p=>p.materia))]

materias.forEach(m=>{

let botao=document.createElement("div")
botao.className="temaBtn"
botao.innerText=m


botao.onclick=function(){

materiaSelecionada=m

document.querySelectorAll(".temaBtn").forEach(b=>{
b.classList.remove("selecionadaMenu")
})

botao.classList.add("selecionadaMenu")

}

menu.appendChild(botao)

})

let confirmar=document.createElement("button")
confirmar.innerText="Confirmar matéria"

confirmar.onclick=function(){

if(!materiaSelecionada){
alert("Selecione uma matéria")
return
}



criarMenuAssuntos(materiaSelecionada)

}

menu.appendChild(confirmar)

}

function criarMenuAssuntos(materia){

let menu=document.getElementById("menu")

let assuntos=[...new Set(banco.filter(p=>p.materia===materia).map(p=>p.assunto))]

menu.innerHTML="<h2>"+materia+"</h2><p>Escolha o assunto</p>"

assuntos.forEach(a=>{

let botao=document.createElement("div")
botao.className="temaBtn"
botao.innerText=a



botao.onclick=function(){

assuntoSelecionado=a

document.querySelectorAll(".temaBtn").forEach(b=>{
b.classList.remove("selecionadaMenu")
})

botao.classList.add("selecionadaMenu")

}

menu.appendChild(botao)

})

let confirmar=document.createElement("button")
confirmar.innerText="Confirmar assunto"

confirmar.onclick=function(){

if(!assuntoSelecionado){
alert("Selecione um assunto")
return
}

iniciarQuiz(materiaSelecionada,assuntoSelecionado)

}

menu.appendChild(confirmar)

}

function iniciarQuiz(materia,assunto){

perguntas=banco.filter(p=>p.materia===materia && p.assunto===assunto)

document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"

atual=0
pontos=0

carregar()

}

function carregar(){

let p=perguntas[atual]

document.getElementById("tema").innerText=p.materia+" → "+p.assunto
document.getElementById("pergunta").innerText=p.pergunta

for(let i=0;i<4;i++){

let op=document.getElementById("op"+i)

op.innerText=p.opcoes[i]
op.className="opcao"

op.onclick=function(){

opcaoSelecionada=i

document.querySelectorAll(".opcao").forEach(o=>{
o.classList.remove("selecionada")
})

op.classList.add("selecionada")

}

}

document.getElementById("placar").innerText=
"Pergunta "+(atual+1)+" de "+perguntas.length+" | Pontos: "+pontos

document.getElementById("progresso").style.width=
((atual/perguntas.length)*100)+"%"

document.getElementById("explicacao").innerText=""

document.getElementById("btnProxima").style.display="none"
document.getElementById("btnConfirmar").style.display="block"

respondido=false
opcaoSelecionada=null

}

function confirmarResposta(){

if(opcaoSelecionada===null){
alert("Selecione uma opção")
return
}

responder(opcaoSelecionada)

document.getElementById("btnProxima").style.display="block"
document.getElementById("btnConfirmar").style.display="none"

}

function responder(i){

if(respondido) return

respondido=true

let correta=perguntas[atual].correta

if(i===correta){

document.getElementById("op"+i).classList.add("correta")
pontos++

}else{

document.getElementById("op"+i).classList.add("errada")
document.getElementById("op"+correta).classList.add("correta")

}

document.getElementById("explicacao").innerText=
"Explicação: "+perguntas[atual].explicacao

}

function proxima(){

atual++

if(atual>=perguntas.length){

alert("Fim do quiz! Acertou "+pontos+" de "+perguntas.length)

location.reload()
return

}

carregar()

}

function voltarMenu(){
location.reload()
}

</script>

</body>
</html>
